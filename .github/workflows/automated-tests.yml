name: Automated Tests

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"

jobs:
  api-and-cms-tests:
    name: API and CMS tests
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore test projects
        run: |
          dotnet restore .\tests\VinhKhanhTour.API.Tests\VinhKhanhTour.API.Tests.csproj
          dotnet restore .\tests\VinhKhanhTour.CMS.E2ETests\VinhKhanhTour.CMS.E2ETests.csproj
          dotnet restore .\tests\VinhKhanhTour.MAUI.AppiumTests\VinhKhanhTour.MAUI.AppiumTests.csproj

      - name: Build API and CMS projects
        run: |
          dotnet build .\VinhKhanhTour.API\VinhKhanhTour.API.csproj --no-restore
          dotnet build .\VinhKhanhTour.CMS\VinhKhanhTour.CMS.csproj --no-restore
          dotnet build .\tests\VinhKhanhTour.API.Tests\VinhKhanhTour.API.Tests.csproj --no-restore
          dotnet build .\tests\VinhKhanhTour.CMS.E2ETests\VinhKhanhTour.CMS.E2ETests.csproj --no-restore
          dotnet build .\tests\VinhKhanhTour.MAUI.AppiumTests\VinhKhanhTour.MAUI.AppiumTests.csproj --no-restore

      - name: Install Playwright Chromium
        run: .\tests\VinhKhanhTour.CMS.E2ETests\bin\Debug\net10.0\playwright.ps1 install chromium

      - name: Run API tests
        run: |
          dotnet test .\tests\VinhKhanhTour.API.Tests\VinhKhanhTour.API.Tests.csproj --no-build --logger "trx;LogFileName=api-tests.trx" --results-directory .\TestResults
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0 -and (Test-Path .\TestResults\api-tests.trx)) {
            [xml]$trx = Get-Content .\TestResults\api-tests.trx
            $ns = New-Object System.Xml.XmlNamespaceManager($trx.NameTable)
            $ns.AddNamespace("trx", "http://microsoft.com/schemas/VisualStudio/TeamTest/2010")
            $results = $trx.SelectNodes("//trx:UnitTestResult[@outcome!='Passed']", $ns)
            foreach ($result in $results) {
              $message = $result.Output.ErrorInfo.Message
              if ([string]::IsNullOrWhiteSpace($message)) {
                $message = $result.outcome
              }
              $encodedMessage = $message.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
              Write-Host "::error title=API test failed::$($result.testName): $encodedMessage"
            }
          }
          exit $exitCode

      - name: Run CMS Playwright tests
        run: dotnet test .\tests\VinhKhanhTour.CMS.E2ETests\VinhKhanhTour.CMS.E2ETests.csproj --no-build --logger "trx;LogFileName=cms-e2e-tests.trx" --results-directory .\TestResults

      - name: Run MAUI Appium contract tests
        run: dotnet test .\tests\VinhKhanhTour.MAUI.AppiumTests\VinhKhanhTour.MAUI.AppiumTests.csproj --no-build --logger "trx;LogFileName=maui-appium-tests.trx" --results-directory .\TestResults

      - name: Upload test reports and failure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults/**/*.trx
            TestResults/artifacts/**
          if-no-files-found: ignore

  api-postgres-nightly:
    name: API tests on Postgres
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore API test project
        run: dotnet restore tests/VinhKhanhTour.API.Tests/VinhKhanhTour.API.Tests.csproj

      - name: Build API test project
        run: dotnet build tests/VinhKhanhTour.API.Tests/VinhKhanhTour.API.Tests.csproj --no-restore

      - name: Run API tests against Postgres
        env:
          API_TEST_DATABASE: postgres
          API_TEST_CONNECTION_STRING: Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres;Pooling=false;Include Error Detail=true
        run: |
          dotnet test tests/VinhKhanhTour.API.Tests/VinhKhanhTour.API.Tests.csproj --no-build --logger "trx;LogFileName=api-postgres-tests.trx" --results-directory ./TestResults
          exitCode=$?
          if [ $exitCode -ne 0 ] && [ -f ./TestResults/api-postgres-tests.trx ]; then
            python - <<'PY'
          import xml.etree.ElementTree as ET

          ns = {"trx": "http://microsoft.com/schemas/VisualStudio/TeamTest/2010"}
          tree = ET.parse("./TestResults/api-postgres-tests.trx")
          for result in tree.findall(".//trx:UnitTestResult", ns):
              if result.attrib.get("outcome") == "Passed":
                  continue
              name = result.attrib.get("testName", "Unknown test")
              message = result.attrib.get("outcome", "Failed")
              error = result.find(".//trx:Message", ns)
              if error is not None and error.text:
                  message = error.text
              message = message.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              print(f"::error title=Postgres API test failed::{name}: {message}")
          PY
          fi
          exit $exitCode

      - name: Upload Postgres test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-postgres-test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore
