name: Automated Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  api-and-cms-tests:
    name: API and CMS tests
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore test projects
        run: |
          dotnet restore .\tests\VinhKhanhTour.API.Tests\VinhKhanhTour.API.Tests.csproj
          dotnet restore .\tests\VinhKhanhTour.CMS.E2ETests\VinhKhanhTour.CMS.E2ETests.csproj
          dotnet restore .\tests\VinhKhanhTour.MAUI.AppiumTests\VinhKhanhTour.MAUI.AppiumTests.csproj

      - name: Build API and CMS projects
        run: |
          dotnet build .\VinhKhanhTour.API\VinhKhanhTour.API.csproj --no-restore
          dotnet build .\VinhKhanhTour.CMS\VinhKhanhTour.CMS.csproj --no-restore
          dotnet build .\tests\VinhKhanhTour.API.Tests\VinhKhanhTour.API.Tests.csproj --no-restore
          dotnet build .\tests\VinhKhanhTour.CMS.E2ETests\VinhKhanhTour.CMS.E2ETests.csproj --no-restore
          dotnet build .\tests\VinhKhanhTour.MAUI.AppiumTests\VinhKhanhTour.MAUI.AppiumTests.csproj --no-restore

      - name: Install Playwright Chromium
        run: .\tests\VinhKhanhTour.CMS.E2ETests\bin\Debug\net10.0\playwright.ps1 install chromium

      - name: Run API tests
        run: dotnet test .\tests\VinhKhanhTour.API.Tests\VinhKhanhTour.API.Tests.csproj --no-build --logger trx

      - name: Run CMS Playwright tests
        run: dotnet test .\tests\VinhKhanhTour.CMS.E2ETests\VinhKhanhTour.CMS.E2ETests.csproj --no-build --logger trx

      - name: Run MAUI Appium contract tests
        run: dotnet test .\tests\VinhKhanhTour.MAUI.AppiumTests\VinhKhanhTour.MAUI.AppiumTests.csproj --no-build --logger trx
