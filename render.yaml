services:
  - type: web
    name: phoamthuc
    runtime: docker
    dockerfilePath: ./VinhKhanhTour.API/Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: SUPABASE_CONNECTION_STRING
        sync: false
      - key: ADMIN_API_TOKEN
        generateValue: true
  - type: web
    name: phoamthuc-cms
    runtime: docker
    dockerfilePath: ./VinhKhanhTour.CMS/Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: SUPABASE_CONNECTION_STRING
        sync: false
      - key: CMS_ADMIN_USERNAME
        value: admin
      - key: CMS_ADMIN_PASSWORD
        generateValue: true
      - key: ApiBaseUrl
        value: https://phoamthuc.onrender.com
